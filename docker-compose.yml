services:
  backend:
    container_name: be-dicc
    build:
      context: ./backend
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4321}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-to-a-long-random-secret}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    ports:
      - "8000:8000"