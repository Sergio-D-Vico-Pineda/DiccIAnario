services:
  backend:
    container_name: backend
    build:
      context: ./backend
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4321}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-to-a-long-random-secret}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    networks:
      - dicc-network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
#    ports:
#      - "4321:4321"
    depends_on:
      - backend
    networks:
      - dicc-network
      - shared-net

networks:
  dicc-network:
    driver: bridge
  shared-net:
    external: true
